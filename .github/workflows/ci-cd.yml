name: Build, Test and Push

on:
  push:
    branches: [ "main" ]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1. Собираем образ, но ПОКА НЕ отправляем (load: true оставляет его локально)
      - name: Build Docker image for testing
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true 
          tags: exam-app:test

      # 2. ТЕСТИРОВАНИЕ
      - name: Run Integration Tests
        run: |
          echo "Запускаем контейнер..."
          docker run -d -p 8080:80 --name test-container exam-app:test
          
          echo "Ждем пару секунд для старта Nginx..."
          sleep 2
          
          echo "Проверяем доступность сайта..."
          # Делаем запрос к нашему запущенному контейнеру
          # grep ищет слово "Привет". Если не найдет - шаг завершится с ошибкой (exit code 1)
          curl -s http://localhost:8080 | grep "Version 1.0"
          
          echo "Тест пройден успешно!"

      # 3. Если тесты прошли, логинимся в реестр
      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Собираем еще раз и уже ПУШИМ (из-за кэша это займет 1 секунду)
      - name: Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/exam-app:latest